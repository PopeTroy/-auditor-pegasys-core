name: Auditor Pegasys Chronos Sweep Engine

on:
  repository_dispatch:
    types: [pegasys_hunt_event]
  workflow_dispatch:
    inputs:
      node_payload:
        description: 'Target Subject / Node Paragraph Block'
        required: true
        default: 'Grid corruption and capacity constraints causing local downtime.'

permissions:
  contents: write

jobs:
  run-pegasys-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Audit via Single Node Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          EVENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          INPUT_NODE: ${{ inputs.node_payload }}
        run: python cli_audit.py

      - name: Commit Audit Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add last_audit_results.json
          git commit -m "Update audit results for single node [skip ci]" || exit 0
          git push origin main
