name: Auditor Pegasys Chronos Sweep

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Full-Stack Chronos Sweep
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          PREFERRED_ENGINE: "nvidia_nim"
        run: |
          python -c "
          from core.inference_router import InferenceEngineRouter
          from sweep.chronos import FullStackChronosEngine
          from core.quantum_clock import QuantumClockEngine

          router = InferenceEngineRouter()
          chronos = FullStackChronosEngine(router)
          cycle = QuantumClockEngine.get_current_cycle()
          
          results = chronos.execute_full_sweep(
              industry='Energy Grid',
              payload='GitHub Action Automated Infrastructure Sweep',
              cycle=cycle
          )
          print('--- CHRONOS SWEEP RESULTS ---')
          print(results)
          "
